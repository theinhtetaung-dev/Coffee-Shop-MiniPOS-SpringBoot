spring.datasource.password=sasa@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Springdoc / OpenAPI ──────────────────────────────────────────────────────
# Scalar UI is at: http://localhost:8080/docs
# Swagger UI fallback is at: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
# Disable auto-redirect from root to swagger-ui
springdoc.swagger-ui.disable-swagger-default-url=true
# OpenAPI JSON available at: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs